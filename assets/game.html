<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="style.css">
</head>

<body style="scale: 1; position: absolute; transform-origin: center;">
  
  <div id="GUI" style="position: absolute; left: 1px; top: 1px; z-index: 10;">
    <div id="loadingS" style="position: absolute; left: -10px; top: -10px; background-color: black; width: 1000px; height: 1000px; opacity: 1; z-index: 11;" ></div>
    
    <div id="notes" style="scale: 1; visibility: visible; position: absolute; top: -4px; z-index: 10;"></div>
    
    <img id="PressFoPlay" onclick="startingGlobalGame()" src="assets/images/PressToPlay.png" style="position: absolute; left: -8px; top: -8px; z-index: 11; " />
    
    <div id="pauseMenu" style="scale: 1; visibility: hidden; position: absolute; z-index: 11;">
      <div style="position: absolute; left: -10px; top: -10px; background-color: black; width: 1000px; height: 1000px; opacity: 0.5; z-index: 11;" ></div>
      <a id="menu songName" style="position: absolute; z-index: 11; opacity: 1; width: 700px;">...</a>
      
      <a style="position: absolute; z-index: 11; opacity: 1; font-size: 21px; top: 100px; width: 200px;" onclick="pauseMenu()" >< Resume</a>
      
      <a style="position: absolute; z-index: 11; opacity: 1; font-size: 21px; top: 150px; width: 200px;" onclick="transition(1)" >< Restart</a>

      <a style="position: absolute; z-index: 11; opacity: 1; font-size: 21px; top: 200px; width: 200px;" onclick="transition(4)" >< exit</a>

    </div>
    
  </div>
  <div id="GAME" style="scale: 1; position: absolute; left: 1px; top: 1px; z-index: 0; transform-origin: center;" >
    <div id="characters">
      <div id="Boyfriend" style="position: absolute; z-index: 1;"></div>
      <div id="Girlfriend" style="position: absolute; z-index: 0;"></div>
      <div id="Dad" style="position: absolute; z-index: 1;"></div>
    </div>
  </div>
  
  <!-- script ( and extension ) -->

  <script src="script/global/module/HPS engine.js"></script>
  
  <script src="script/global/mainGlobal.js"></script>
  <script src="script/game/notes.js"></script>
  <script src="script/game/mainGame.js"></script>
  
  <script src="script/game/mobileButtons.js"></script>
  <script src="script/game/gameGui.js"></script>
  
  <script src="script/global/animate v1.js"></script>
  <script src="script/global/bpm.js"></script>
  <script src="script/game/events.js"></script>
  <script src="script/game/pauseMenu/menuPause.js"></script>
  <script src="script/game/characters.js"></script>
  <script src="script/game/chartPlayer.js"></script>

  
</body>
  <style>
    body {
      background-Color: black;
      transform-origin: center;
    }
  </style>

<div>
</div>

</html>
