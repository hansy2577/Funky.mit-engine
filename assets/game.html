<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="style.css">
</head>

<body style="scale: 1; position: absolute;">
  
  <div id="GUI" style="position: absolute; left: 1px; top: 1px; z-index: 2;">
    <div id="notes" style="scale: 1; visibility: visible; position: absolute; top: -4px; z-index: 10;"></div>
    <img id="PressFoPlay" src="assets/images/PressToPlay.png" style="position: absolute; left: -8px; top: -8px; z-index: 10; " />
    
    <div id="pauseMenu" style="scale: 1; visibility: hidden; position: absolute; z-index: 11;">
      <div style="position: absolute; left: -10px; top: -10px; background-color: black; width: 1000px; height: 1000px; opacity: 0.5; z-index: 4;" ></div>
      <a id="songName" style="position: absolute; z-index: 11; opacity: 1;">helloooo</a>
      
      <a style="position: absolute; z-index: 11; opacity: 1; font-size: 21px; top: 100px; width: 200px;" onclick="pauseMenu()" >< Resume</a>
      
      <a style="position: absolute; z-index: 11; opacity: 1; font-size: 21px; top: 150px; width: 200px;" onclick="transition(1)" >< Restart</a>

      <a style="position: absolute; z-index: 11; opacity: 1; font-size: 21px; top: 200px; width: 200px;" onclick="transition(2)" >< exit</a>

    </div>
    
  </div>
  <div id="GAME" style="scale: 1; position: absolute; left: 1px; top: 1px; z-index: 0;" >
    <div id="Boyfriend">
      <div id="bf N" style="position: absolute;"></div>
      <div id="bf L" style="position: absolute;"></div>
      <ul id="bf U" style="position: absolute;"></ul>
      <div id="bf D" style="position: absolute;"></div>
      <div id="bf R" style="position: absolute;"></div>
    </div>
    <div id="Dad">
      <div id="Dad N" style="position: absolute;"></div>
      <div id="Dad L" style="position: absolute;"></div>
      <ul id="Dad U" style="position: absolute;"></ul>
      <div id="Dad D" style="position: absolute;"></div>
      <div id="Dad R" style="position: absolute;"></div>
    </div>
    <div id="Gf"></div>
  </div>
  
  <!-- script ( and extension ) -->

  <script src="script/main/global.js"></script>
  <script src="script/notes.js" defer></script>
  <script src="script/main/gameStat.js" defer></script>
  
  <script src="script/mobileButtons.js"></script>
  <script src="script/gameGui.js"></script>
  
  <script src="script/animate.js"></script>
  <script src="script/bpm.js"></script>
  <script src="script/events.js"></script>
  <script src="script/menuPause.js"></script>
  <script src="script/characters.js"></script>
  
</body>
  <style>
    body {
      background-Color: black;
    }
  </style>

<div>
</div>

</html>
