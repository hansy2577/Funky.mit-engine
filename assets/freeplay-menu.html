<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="style.css">
</head>

  <body style="scale: 1; position: absolute;">
  
  <div id="freeplay" style="position: absolute; visibility: visible;">
    <img src="" style="position: absolute; left: -8px; top: -8px; z-index: -1; opacity: 0.4; background-color: red; visibility: hidden;" alt="freeplayBG" id="freeplayBG" />
    
    <div id="BGcolor" style="position: absolute; left: -8px; top: -8px; z-index: -5; width: 900px; height: 500px; background-color: black; visibility: hidden;"></div>
    
    <div style="zIndex: 5; position: absolute; background-Color: #00000052; border-radius: 6px; padding: 6px; left: 350px; top: -90px; height: 100px; width: 300px;"></div>

    <a onclick="settings()" style="zIndex: 5; position: absolute; background-Color: grey; top: -5px; left: -100px; padding: 2px; font-size: 17px; border: 0.5px solid black;">settings</a>

    <a id="difficult" onclick="difficult()" style="zIndex: 5; position: absolute; top: -5px; left: 350px; padding: 2px; font-size: 17px; width: 100px;">‹ normal ›</a>

    <a onclick="play()" style="zIndex: 5; position: absolute; background-Color: #00830569; top: -5px; left: 550px; padding: 2px; font-size: 17px; border: 0.5px solid black;">play</a>
    
    <img onclick="moveUp()" src="mods/test/images//mobileButton arrows.png" style="position: absolute; left: 400px; top: 80px; z-index: -1; scale: 0.2; transform: rotate(-90deg);" />
    <img onclick="moveDown()" src="mods/test/images//mobileButton arrows.png" style="position: absolute; left: 400px; top: 150px; z-index: -1; scale: 0.2; transform: rotate(90deg);" />

  </div>
  
  <script src="script/main/global.js"></script>
  <script src="script/main/freeplayStat.js"></script>
</body>
  <style>
    body {
      background-Color: black;
    }
  </style>
<div>
</div>

</html>
